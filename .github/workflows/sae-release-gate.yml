name: Retired public release gate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  retired:
    name: Public release gate moved to private operations
    runs-on: ubuntu-latest
    steps:
      - name: Refuse public-repo release gate
        run: |
          echo "::error::The public repository release gate is retired."
          echo "::error::All production publishing now runs through Owner-approved private operations control."
          exit 1
